
<style>
@import url('https://fonts.googleapis.com/css2?family=Raleway:wght@800;900&family=Inter:wght@300;400&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;display:flex;align-items:center;justify-content:center;min-height:140px}

.logo{
  display:inline-flex;align-items:center;gap:22px;
  padding:28px 40px;background:#fff;
  cursor:default;user-select:none;
  position:relative;
}

.glow-line{
  position:absolute;
  bottom:16px;left:40px;
  width:0%;height:2px;border-radius:2px;
  background:linear-gradient(90deg,#00C2FF,#7B5EA7,#00C2FF);
  background-size:200% 100%;
  opacity:0;
  transition:width 0.7s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease;
}
.logo:hover .glow-line{
  width:45%;opacity:1;
  animation:shimmer 2s linear infinite;
}
@keyframes shimmer{
  0%{background-position:0% 50%}
  100%{background-position:200% 50%}
}

.wordmark{
  font-family:'Raleway','Century Gothic',sans-serif;
  font-size:50px;font-weight:900;
  letter-spacing:-1px;
  display:inline-flex;align-items:center;
}

.w-dark{color:#1A2332}

.w-multi{
  display:inline-block;
  background:linear-gradient(135deg,#00C2FF 0%,#7B5EA7 50%,#00C2FF 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.logo:hover .w-multi{
  animation:colorshift 1.8s ease infinite;
}
@keyframes colorshift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.sep{
  width:1.5px;height:36px;
  background:#DDDDDD;flex-shrink:0;
  transition:background 0.4s ease;
}
.logo:hover .sep{background:#7B5EA7}

.tagline{
  font-family:'Inter','Segoe UI',system-ui,sans-serif;
  font-size:15px;font-weight:300;
  color:#AAAAAA;letter-spacing:0.3px;
  transition:color 0.5s ease;
}
.logo:hover .tagline{color:#1A2332}
</style>

<div class="logo">
  <div class="glow-line"></div>
  <span class="wordmark">
    <span class="w-dark">Gap</span><span class="w-multi">A</span><span class="w-dark">nchor</span>
  </span>
  <div class="sep"></div>
  <span class="tagline">Let's bridge the gap together.</span>
</div>
